site_name: Florin Neagu Projects & Notes
site_url: https://somelamecode.github.io/mkdocs-blog/
site_description: Technical notes, projects, articles, and code references
site_author: Florin Neagu
repo_url: https://github.com/SomeLameCode/mkdocs-blog
repo_name: SomeLameCode/mkdocs-blog
copyright: "Copyright &copy; 2026 Florin Neagu"

# Material theme
theme:
  name: material
  favicon: assets/favicon.svg
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: indigo
      accent: indigo

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: indigo
      accent: indigo

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  - tags
  - mermaid2
  - git-revision-date-localized:
      type: datetime
      fallback_to_build_date: true
  - rss:
      match_path: "(articles|projects)/.*"
      date_from_meta:
        as_creation: date
      categories:
        - tags
      use_material_social_cards: false

# Paths
docs_dir: docs      # folder with your Markdown content
site_dir: site      # output folder for the built HTML

# Navigation
