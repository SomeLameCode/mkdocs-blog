        - Ch 06 Tracking Files & File States: manuals/github-in-a-nutshell/part2/ch06-file-states.md
        - Ch 07 Ignoring Files (.gitignore): manuals/github-in-a-nutshell/part2/ch07-gitignore.md
        - Ch 08 Undoing Changes: manuals/github-in-a-nutshell/part2/ch08-undoing-changes.md
        - Ch 09 Stashing: manuals/github-in-a-nutshell/part2/ch09-stashing.md
        - Ch 10 Inspecting History: manuals/github-in-a-nutshell/part2/ch10-inspecting-history.md
      - Part 3 — Branching & History Management:
        - Ch 11 Branches and HEAD: manuals/github-in-a-nutshell/part3/ch11-branches-head.md
        - Ch 12 Merging Branches: manuals/github-in-a-nutshell/part3/ch12-merging.md
        - Ch 13 Rebasing: manuals/github-in-a-nutshell/part3/ch13-rebasing.md
        - Ch 14 Interactive Rebase: manuals/github-in-a-nutshell/part3/ch14-interactive-rebase.md
