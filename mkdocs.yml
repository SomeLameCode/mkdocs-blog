        - Ch 01 Introduction to Version Control & Git: manuals/github-in-a-nutshell/part1/ch01-introduction.md
        - Ch 02 Shell Commands Primer: manuals/github-in-a-nutshell/part1/ch02-shell-commands.md
        - Ch 03 Installing & Configuring Git: manuals/github-in-a-nutshell/part1/ch03-install-configure.md
        - Ch 04 GitHub Authentication: manuals/github-in-a-nutshell/part1/ch04-github-authentication.md
      - Part 2 — Core Git Workflow:
