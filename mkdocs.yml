site_name: Florin Neagu Projects & Notes
site_url: https://somelamecode.github.io/notes/
site_description: Technical notes, projects, articles, and code references
site_author: Florin Neagu
repo_url: https://github.com/SomeLameCode/notes
repo_name: SomeLameCode/notes
copyright: "Copyright &copy; 2026 Florin Neagu"

# Material theme
theme:
  name: material
  favicon: assets/favicon.svg
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: indigo
      accent: indigo

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: indigo
      accent: indigo

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  - tags:
      tags_file: tags.md
  - mermaid2
  - git-revision-date
  - git-revision-date-localized:
      type: datetime
      fallback_to_build_date: true
 

# Paths
docs_dir: docs      # folder with your Markdown content
site_dir: site      # output folder for the built HTML

# Navigation
nav:
  - Home: index.md
  - Articles:
    - Overview: articles/index.md
    - MkDocs & Material:
      - articles/mkdocs-material/index.md
      - MkDocs Setup: articles/mkdocs-material/mkdocs-setup.md
      - Publish to GitHub Pages: articles/mkdocs-material/mkdocs-site-update.md
      - Obsidian Integration: articles/mkdocs-material/mkdocs-integrate-with-obsidian.md
      - Admonitions: articles/mkdocs-material/admonitions.md
      - Content Tabs: articles/mkdocs-material/content-tabs.md
      - Diagram Examples: articles/mkdocs-material/diagram-examples.md
    - Code & Data:
      - articles/code/index.md
      - Normal Distribution Generator: articles/code/code-example.md
  - Projects:
    - Overview: projects/index.md
    - Paperless-ngx: projects/paperless-ngx.md
    - GitHub in a Nutshell: projects/github-in-a-nutshell.md
    - M365 Tenant Separation: projects/m365-tenant-separation.md
    - Lifting Diary:
      - Overview: projects/lifting-diary-claude.md
      - The Application: projects/lifting-diary-claude/the-application.md
      - Building with Claude Code: projects/lifting-diary-claude/building-with-claude-code.md
      - Architecture as Input: projects/lifting-diary-claude/architecture-as-input.md
      - Prompt Log: projects/lifting-diary-claude/prompt-log.md
  - Code: code/index.md
  - Notebooks: notebooks/index.md
  - Tags: tags.md

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
        custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format  
  - pymdownx.tabbed:
      alternate_style: true      
  - admonition
  - pymdownx.details

extra_css:
  - stylesheets/extra.css