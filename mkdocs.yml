        - App B Git LFS: manuals/github-in-a-nutshell/appendix/appB-git-lfs.md
        - App C Signed Commits & GPG: manuals/github-in-a-nutshell/appendix/appC-signed-commits.md
  - Code:
    - code/index.md
    - Invoice Processing: code/invoice-processing.md
    - Transcript Action Extractor: code/transcript-action-extractor.md
    - TTS Audio Generator: code/tts-audio-generator.md
  - Notebooks: notebooks/index.md
  - Tags: tags.md

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
        custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format  
  - pymdownx.tabbed:
      alternate_style: true      
  - admonition
  - pymdownx.details

extra_css:
  - stylesheets/extra.css